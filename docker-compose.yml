x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  discover:
    build: .
    command: ["python", "discover_companys.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    restart: "no"
    logging: *default-logging

  ashby:
    build: .
    command: ["python", "ashby.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging: *default-logging

  greenhouse:
    build: .
    command: ["python", "greenhouse.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging: *default-logging

  lever:
    build: .
    command: ["python", "lever.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging: *default-logging

  dashboard:
    build: .
    command: ["python", "dashboard.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-18080}:8080"
    restart: unless-stopped
    logging: *default-logging

  metrics:
    build: .
    command: ["python", "metrics_exporter.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${METRICS_PORT:-19108}:9108"
    restart: unless-stopped
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-19090}:9090"
    depends_on:
      - metrics
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-13000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging

  monitors:
    build: .
    command: ["python", "run_all.py"]
    env_file: [.env.local]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging: *default-logging

volumes:
  prometheus-data:
  grafana-data:
